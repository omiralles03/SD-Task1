services:
  redis:
    image: redis:8-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: rabbitmq_server
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
