services:
  redis:
    image: redis:8-alpine
    network_mode: "host"
    container_name: redis_server
    volumes:
      - redis_data:/data # Failure tolerance
    command: redis-server --save 60 1 --loglevel warning
    restart: always
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    network_mode: "host"
    container_name: rabbitmq_server
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
  nginx-lb:
    image: nginx:latest
    network_mode: "host"
    volumes:
      - ./direct-communication/nginx.deployment.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - worker
  worker:
    build: .
    network_mode: "host"
    command: uvicorn direct-communication.worker:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_started
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=localhost
  consumer:
    build: .
    network_mode: "host"
    command: python indirect_communication/consumer.py
    # container_name: ticket_worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - REDIS_HOST=localhost
      - RABBIT_HOST=localhost
      - PYTHONUNBUFFERED=1
    restart: always
volumes:
  redis_data:
